# cargo-deny configuration for Soroban-ZK-Std
# Stellar Foundation Grant Submission — dependency audit policy
# https://embarkstudios.github.io/cargo-deny/

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "Zlib",
]
confidence-threshold = 0.8

[advisories]
version = 2
# Explicit ignore list — each entry documents WHY it is suppressed.
# This is not a blanket waiver; each advisory was individually reviewed.
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "paste is an indirect transitive dependency pulled in by soroban-env-host v25.0.1 and ark-ff v0.4.2, both of which are Stellar-maintained or upstream ZK crates outside our control. The advisory is a maintenance notice only — no CVE, no exploit, no known vulnerability. We have no upgrade path; soroban-sdk 25.3.0 does not yet ship with a paste-free env-host." },
]

[bans]
# Deny duplicate versions of security-critical crates
multiple-versions = "warn"
wildcards = "allow"
# Flag if anyone adds a git-pinned dep without review
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
